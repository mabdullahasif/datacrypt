name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: DataCrypt-Windows.exe
            engine_name: datacrypt.exe
            icon_file: app_icon.ico
          - os: macos-latest
            artifact_name: DataCrypt-macOS
            engine_name: datacrypt
            icon_file: app_icon.icns

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Go Engine
        run: |
          go build -ldflags="-s -w" -o gui/${{ matrix.engine_name }} ./cmd/datacrypt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 PyInstaller Pillow

      - name: Build GUI with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd gui
          python -m PyInstaller --onefile --windowed --icon "${{ matrix.icon_file }}" --name "DataCrypt" --add-data "${{ matrix.engine_name }};." --add-data "app_icon.png;." main.py

      - name: Build GUI with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd gui
          python -m PyInstaller --onefile --windowed --icon "${{ matrix.icon_file }}" --name "DataCrypt" --add-data "${{ matrix.engine_name }}:." --add-data "app_icon.png:." main.py
          # Rename the .app bundle if needed, but we targeting a single binary here for simplicity
          mv dist/DataCrypt dist/${{ matrix.artifact_name }}

      - name: Prepare Artifact
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv gui/dist/DataCrypt.exe gui/dist/${{ matrix.artifact_name }}
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: gui/dist/${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
